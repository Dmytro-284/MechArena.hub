<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Mech Arena Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#060c14;--panel:#0b1622;--p2:#0d1c2e;--brd:#1a3a5c;
  --acc:#00d4ff;--acc2:#ff6b00;--acc3:#7fff00;
  --txt:#c8dff0;--dim:#5a7a99;--red:#ff3232;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--txt);font-family:'Montserrat',sans-serif;font-size:14px;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,212,255,.02) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,.02) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0;}

/* LOGIN */
#screen-login{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:10;}
.login-box{background:var(--panel);border:1px solid var(--brd);border-radius:8px;padding:40px 36px;width:100%;max-width:380px;position:relative;overflow:hidden;}
.login-box::before{content:'';position:absolute;inset:0;background:radial-gradient(400px circle at 50% 0%,rgba(0,212,255,.07),transparent 60%);pointer-events:none;}
.login-icon{text-align:center;font-size:48px;line-height:1;margin-bottom:4px;}
.login-title{font-family:'Orbitron',monospace;font-size:1.4rem;font-weight:900;color:var(--acc);text-align:center;letter-spacing:4px;text-shadow:0 0 20px rgba(0,212,255,.4);}
.login-sub{text-align:center;font-size:10px;color:var(--dim);letter-spacing:3px;margin-bottom:28px;margin-top:4px;}
.flbl{display:block;font-size:10px;color:var(--dim);letter-spacing:2px;text-transform:uppercase;margin-bottom:5px;margin-top:16px;}
.finput{width:100%;background:var(--bg);border:1px solid var(--brd);color:var(--txt);padding:10px 12px;font-family:'Montserrat',sans-serif;font-size:14px;border-radius:4px;outline:none;transition:border-color .2s;}
.finput:focus{border-color:var(--acc);}
.l-err{margin-top:10px;padding:9px 12px;background:rgba(255,50,50,.08);border-left:3px solid var(--red);font-size:12px;color:var(--red);display:none;}
.l-btn{margin-top:20px;width:100%;padding:12px;background:linear-gradient(135deg,rgba(0,212,255,.15),rgba(0,212,255,.05));border:1px solid var(--acc);color:var(--acc);font-family:'Orbitron',monospace;font-size:12px;font-weight:700;letter-spacing:2px;cursor:pointer;border-radius:4px;transition:all .2s;}
.l-btn:hover{background:rgba(0,212,255,.2);box-shadow:0 0 16px rgba(0,212,255,.25);}
.l-btn:disabled{opacity:.5;cursor:not-allowed;}

/* SHELL */
#screen-admin{display:none;position:relative;z-index:1;}
.adm-header{display:flex;align-items:center;justify-content:space-between;padding:14px 28px;background:var(--panel);border-bottom:1px solid var(--brd);position:sticky;top:0;z-index:100;}
.adm-brand{font-family:'Orbitron',monospace;font-size:13px;font-weight:900;color:var(--acc);display:flex;align-items:center;gap:10px;letter-spacing:2px;}
.adm-badge{background:rgba(255,107,0,.15);color:var(--acc2);border:1px solid rgba(255,107,0,.35);border-radius:3px;font-size:9px;padding:3px 9px;letter-spacing:2px;}
.adm-logout{background:transparent;border:1px solid var(--brd);color:var(--dim);font-family:'Orbitron',monospace;font-size:10px;font-weight:700;letter-spacing:1px;cursor:pointer;padding:7px 16px;border-radius:3px;transition:all .2s;}
.adm-logout:hover{border-color:var(--red);color:var(--red);}
.adm-body{max-width:900px;margin:0 auto;padding:24px 20px;}

/* TABS */
.adm-tabs{display:flex;gap:0;border-bottom:1px solid var(--brd);margin-bottom:28px;}
.adm-tab{padding:10px 22px;background:transparent;border:1px solid transparent;border-bottom:none;color:var(--dim);font-family:'Orbitron',monospace;font-size:10px;font-weight:700;letter-spacing:1px;cursor:pointer;position:relative;bottom:-1px;transition:all .2s;}
.adm-tab:hover{color:var(--acc);}
.adm-tab.active{color:var(--acc);border-color:var(--brd);background:var(--panel);border-bottom-color:var(--panel);}
.adm-pane{display:none;}.adm-pane.active{display:block;}

/* STATS */
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:24px;}
.stat-card{background:var(--panel);border:1px solid var(--brd);border-radius:6px;padding:18px 14px;text-align:center;}
.stat-n{font-family:'Orbitron',monospace;font-size:32px;font-weight:900;color:var(--acc);}
.stat-n.green{color:var(--acc3);}
.stat-n.dim{color:var(--dim);}
.stat-l{font-size:10px;color:var(--dim);letter-spacing:2px;text-transform:uppercase;margin-top:4px;}

/* ADD / EDIT FORM */
.add-section{margin-bottom:20px;}
.add-toggle-btn{width:100%;padding:12px 18px;background:transparent;border:1px dashed var(--acc);color:var(--acc);font-family:'Orbitron',monospace;font-size:11px;font-weight:700;letter-spacing:2px;cursor:pointer;border-radius:6px;transition:all .2s;}
.add-toggle-btn:hover,.add-toggle-btn.open{background:rgba(0,212,255,.06);border-style:solid;}
.add-form-box{background:var(--panel);border:1px solid var(--brd);border-top:none;border-radius:0 0 6px 6px;padding:20px 24px;display:none;}
.add-form-box.visible{display:block;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px 20px;}
.form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px 20px;}
.form-actions{margin-top:16px;display:flex;gap:10px;justify-content:flex-end;}
.btn-primary{padding:10px 24px;background:linear-gradient(135deg,rgba(0,212,255,.15),rgba(0,212,255,.05));border:1px solid var(--acc);color:var(--acc);font-family:'Orbitron',monospace;font-size:10px;font-weight:700;letter-spacing:1px;cursor:pointer;border-radius:4px;transition:all .2s;}
.btn-primary:hover{background:rgba(0,212,255,.2);}
.btn-secondary{padding:10px 18px;background:transparent;border:1px solid var(--brd);color:var(--dim);font-family:'Orbitron',monospace;font-size:10px;font-weight:700;letter-spacing:1px;cursor:pointer;border-radius:4px;transition:all .2s;}
.btn-secondary:hover{border-color:var(--txt);color:var(--txt);}

/* TABLE */
.tbl-section{background:var(--panel);border:1px solid var(--brd);border-radius:6px;overflow:hidden;}
.tbl-toolbar{display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:1px solid var(--brd);}
.tbl-toolbar input,.tbl-toolbar select{background:var(--bg);border:1px solid var(--brd);color:var(--txt);padding:7px 10px;font-family:'Montserrat',sans-serif;font-size:13px;border-radius:3px;outline:none;}
.tbl-toolbar input{flex:1;}
.tbl-toolbar input:focus,.tbl-toolbar select:focus{border-color:var(--acc);}
.tbl-count{font-family:'Orbitron',monospace;font-size:11px;color:var(--dim);white-space:nowrap;margin-left:auto;}
.tbl-head{display:grid;background:rgba(0,212,255,.04);border-bottom:1px solid var(--brd);}
.th{padding:10px 14px;font-family:'Orbitron',monospace;font-size:9px;font-weight:700;color:var(--dim);letter-spacing:1px;}
.tbl-body{max-height:520px;overflow-y:auto;}
.tbl-body::-webkit-scrollbar{width:3px;}.tbl-body::-webkit-scrollbar-thumb{background:var(--brd);}
.tbl-row{display:grid;border-bottom:1px solid rgba(26,58,92,.3);align-items:center;transition:background .15s;}
.tbl-row:last-child{border-bottom:none;}
.tbl-row:hover{background:rgba(0,212,255,.03);}
.td{padding:10px 14px;font-size:13px;overflow:hidden;}
.td-code{font-family:'Orbitron',monospace;font-size:12px;font-weight:700;color:var(--acc);}
.td-reward{color:var(--acc3);font-weight:600;}
.td-actions{display:flex;gap:6px;padding:8px 10px;}
.act-btn{padding:4px 10px;background:transparent;border:1px solid var(--brd);color:var(--dim);font-size:11px;cursor:pointer;border-radius:3px;transition:all .15s;font-family:'Montserrat',sans-serif;}
.act-btn.edit:hover{border-color:var(--acc);color:var(--acc);}
.act-btn.del:hover{border-color:var(--red);color:var(--red);}
.toggle-wrap{display:flex;align-items:center;justify-content:center;}
.toggle{position:relative;width:36px;height:20px;cursor:pointer;display:block;}
.toggle input{opacity:0;width:0;height:0;position:absolute;}
.toggle-track{position:absolute;inset:0;background:var(--brd);border-radius:10px;transition:background .2s;}
.toggle input:checked~.toggle-track{background:var(--acc3);}
.toggle-thumb{position:absolute;top:3px;left:3px;width:14px;height:14px;background:#fff;border-radius:50%;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.4);}
.toggle input:checked~.toggle-track~.toggle-thumb{transform:translateX(16px);}
.tbl-empty{padding:48px;text-align:center;color:var(--dim);font-size:13px;}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:500;display:none;align-items:center;justify-content:center;padding:20px;}
.modal-overlay.open{display:flex;}
.modal-box{background:var(--panel);border:1px solid var(--brd);border-radius:8px;width:100%;max-width:440px;}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--brd);}
.modal-title{font-family:'Orbitron',monospace;font-size:12px;font-weight:700;color:var(--acc);letter-spacing:2px;}
.modal-close{background:transparent;border:1px solid var(--brd);color:var(--dim);font-size:14px;cursor:pointer;padding:4px 10px;border-radius:3px;transition:all .15s;}
.modal-close:hover{border-color:var(--red);color:var(--red);}
.modal-body{padding:20px;}
.modal-foot{padding:14px 20px;border-top:1px solid var(--brd);display:flex;gap:10px;justify-content:flex-end;}

/* PATCH FORM */
.patch-section-block{background:var(--bg);border:1px solid var(--brd);border-radius:4px;padding:14px 16px;margin-bottom:10px;}
.patch-section-hdr{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.patch-section-hdr .finput{flex:1;}
.patch-item-row{display:flex;align-items:center;gap:8px;margin-bottom:7px;}
.patch-item-row .finput{flex:1;}
.dot-sel{background:var(--bg);border:1px solid var(--brd);color:var(--txt);padding:8px 8px;font-size:12px;border-radius:3px;outline:none;cursor:pointer;flex-shrink:0;width:104px;}
.dot-sel:focus{border-color:var(--acc);}
.btn-icon{padding:5px 9px;background:transparent;border:1px solid var(--brd);color:var(--dim);font-size:13px;cursor:pointer;border-radius:3px;transition:all .15s;line-height:1;}
.btn-icon:hover{border-color:var(--red);color:var(--red);}
.btn-add-item{margin-top:6px;padding:5px 12px;background:rgba(0,212,255,.05);border:1px dashed rgba(0,212,255,.3);color:var(--acc);font-size:11px;cursor:pointer;border-radius:3px;transition:all .15s;width:100%;}
.btn-add-item:hover{background:rgba(0,212,255,.1);}
.btn-add-section{width:100%;padding:10px;background:rgba(0,212,255,.04);border:1px dashed rgba(0,212,255,.3);color:var(--acc);font-family:'Orbitron',monospace;font-size:10px;letter-spacing:1px;cursor:pointer;border-radius:4px;transition:all .15s;margin-bottom:14px;}
.btn-add-section:hover{background:rgba(0,212,255,.1);}
.item-textarea{resize:vertical;line-height:1.6;}
.type-sel{background:var(--bg);border:1px solid var(--brd);color:var(--txt);padding:10px 12px;font-family:'Montserrat',sans-serif;font-size:14px;border-radius:4px;outline:none;width:100%;}
.type-sel:focus{border-color:var(--acc);}

/* PATCH LIST */
.patch-tbl-head{grid-template-columns:90px 120px 100px 1fr 100px!important;}
.patch-tbl-row{grid-template-columns:90px 120px 100px 1fr 100px!important;}
.patch-ver-cell{font-family:'Orbitron',monospace;font-size:12px;font-weight:700;color:var(--acc);}
.type-badge{display:inline-block;padding:2px 8px;border-radius:2px;font-size:9px;font-family:'Orbitron',monospace;font-weight:700;letter-spacing:1px;}
.type-badge.major{background:rgba(255,107,0,.15);border:1px solid rgba(255,107,0,.3);color:var(--acc2);}
.type-badge.balance{background:rgba(0,212,255,.1);border:1px solid rgba(0,212,255,.2);color:var(--acc);}
.type-badge.content{background:rgba(127,255,0,.1);border:1px solid rgba(127,255,0,.2);color:var(--acc3);}

/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;z-index:1000;padding:12px 20px;border-radius:6px;font-family:'Orbitron',monospace;font-size:11px;font-weight:700;letter-spacing:1px;transform:translateY(60px);opacity:0;transition:all .3s;pointer-events:none;}
.toast.ok{background:rgba(127,255,0,.15);border:1px solid var(--acc3);color:var(--acc3);}
.toast.err{background:rgba(255,50,50,.12);border:1px solid var(--red);color:var(--red);}
.toast.show{transform:translateY(0);opacity:1;}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="screen-login">
  <div class="login-box">
    <div class="login-icon">⬡</div>
    <h1 class="login-title">ADMIN PANEL</h1>
    <p class="login-sub">MECH ARENA HUB</p>
    <form id="login-form">
      <label class="flbl" for="l-user">Username</label>
      <input type="text" id="l-user" class="finput" autocomplete="username" placeholder="admin" required>
      <label class="flbl" for="l-pass">Password</label>
      <input type="password" id="l-pass" class="finput" autocomplete="current-password" placeholder="••••••••" required>
      <div class="l-err" id="l-err">Invalid credentials.</div>
      <button type="submit" class="l-btn" id="l-submit">LOGIN →</button>
    </form>
  </div>
</div>

<!-- ADMIN -->
<div id="screen-admin">
  <header class="adm-header">
    <div class="adm-brand">⬡ MECH ARENA HUB <span class="adm-badge">ADMIN</span></div>
    <button class="adm-logout" onclick="doLogout()">LOGOUT</button>
  </header>

  <div class="adm-body">

    <!-- TABS -->
    <div class="adm-tabs">
      <button class="adm-tab active" onclick="switchAdmTab('codes',this)">🎁 PROMO CODES</button>
      <button class="adm-tab" onclick="switchAdmTab('patches',this)">📋 PATCH NOTES</button>
    </div>

    <!-- ── PROMO CODES PANE ── -->
    <div id="adm-pane-codes" class="adm-pane active">

      <div class="stats-row">
        <div class="stat-card"><div class="stat-n" id="s-total">—</div><div class="stat-l">Total</div></div>
        <div class="stat-card"><div class="stat-n green" id="s-active">—</div><div class="stat-l">Active</div></div>
        <div class="stat-card"><div class="stat-n dim" id="s-inactive">—</div><div class="stat-l">Inactive</div></div>
      </div>

      <div class="add-section">
        <button class="add-toggle-btn" id="add-toggle-btn" onclick="toggleAddForm()">＋ ADD NEW PROMO CODE</button>
        <div class="add-form-box" id="add-form-box">
          <div class="form-row">
            <div>
              <label class="flbl">Code *</label>
              <input type="text" class="finput" id="f-code" placeholder="FREESTUFF2026" oninput="this.value=this.value.toUpperCase()">
            </div>
            <div>
              <label class="flbl">Reward</label>
              <input type="text" class="finput" id="f-reward" placeholder="500 A-Coins + 3 crates">
            </div>
          </div>
          <div class="form-actions">
            <button class="btn-secondary" onclick="toggleAddForm()">CANCEL</button>
            <button class="btn-primary" onclick="submitAdd()">SAVE</button>
          </div>
        </div>
      </div>

      <div class="tbl-section">
        <div class="tbl-toolbar">
          <input type="text" id="tbl-search" placeholder="🔍  Search…" oninput="renderTable()">
          <select id="tbl-filter" onchange="renderTable()">
            <option value="all">All</option>
            <option value="active">Active</option>
            <option value="inactive">Inactive</option>
          </select>
          <span class="tbl-count" id="tbl-count"></span>
        </div>
        <div class="tbl-head" style="grid-template-columns:56px 1fr 1fr 90px">
          <div class="th">Status</div>
          <div class="th">Code</div>
          <div class="th">Reward</div>
          <div class="th">Actions</div>
        </div>
        <div class="tbl-body" id="tbl-body"><div class="tbl-empty">Loading…</div></div>
      </div>

    </div><!-- /codes pane -->

    <!-- ── PATCH NOTES PANE ── -->
    <div id="adm-pane-patches" class="adm-pane">

      <div class="add-section">
        <button class="add-toggle-btn" id="patch-toggle-btn" onclick="togglePatchForm()">＋ ADD PATCH NOTE</button>
        <div class="add-form-box" id="patch-form-box">
          <div class="form-row-3" style="margin-bottom:16px">
            <div>
              <label class="flbl">Version</label>
              <input type="text" class="finput" id="pf-ver" placeholder="3.9 (optional)">
            </div>
            <div>
              <label class="flbl">Date *</label>
              <input type="text" class="finput" id="pf-date" placeholder="May 2026">
            </div>
            <div>
              <label class="flbl">Type</label>
              <select class="type-sel" id="pf-type">
                <option value="balance">Balance</option>
                <option value="major">Major Update</option>
                <option value="content">Content Update</option>
              </select>
            </div>
          </div>

          <div style="font-family:'Orbitron',monospace;font-size:9px;color:var(--dim);letter-spacing:2px;margin-bottom:10px">SECTIONS</div>
          <div id="pf-sections"></div>
          <button class="btn-add-section" onclick="pfAddSection()">＋ ADD SECTION</button>

          <div class="form-actions">
            <button class="btn-secondary" onclick="togglePatchForm()">CANCEL</button>
            <button class="btn-primary" id="pf-save-btn" onclick="submitPatch()">SAVE</button>
          </div>
        </div>
      </div>

      <div class="tbl-section">
        <div class="tbl-toolbar">
          <span style="font-family:'Orbitron',monospace;font-size:10px;color:var(--dim);letter-spacing:1px">PATCH NOTES</span>
          <span class="tbl-count" id="ptbl-count"></span>
        </div>
        <div class="tbl-head patch-tbl-head">
          <div class="th">Version</div>
          <div class="th">Date</div>
          <div class="th">Type</div>
          <div class="th">Sections</div>
          <div class="th">Actions</div>
        </div>
        <div class="tbl-body" id="ptbl-body"><div class="tbl-empty">Loading…</div></div>
      </div>

    </div><!-- /patches pane -->

  </div>
</div>

<!-- EDIT PROMO MODAL -->
<div class="modal-overlay" id="edit-modal">
  <div class="modal-box">
    <div class="modal-head">
      <span class="modal-title">EDIT CODE</span>
      <button class="modal-close" onclick="closeEditModal()">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="e-id">
      <div class="form-row">
        <div>
          <label class="flbl">Code *</label>
          <input type="text" class="finput" id="e-code" oninput="this.value=this.value.toUpperCase()">
        </div>
        <div>
          <label class="flbl">Reward</label>
          <input type="text" class="finput" id="e-reward">
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:12px;margin-top:18px">
        <label class="flbl" style="margin:0">Active</label>
        <label class="toggle">
          <input type="checkbox" id="e-active">
          <span class="toggle-track"></span>
          <span class="toggle-thumb"></span>
        </label>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn-secondary" onclick="closeEditModal()">CANCEL</button>
      <button class="btn-primary" onclick="submitEdit()">SAVE</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let authToken = sessionStorage.getItem('adm_token') || null;
let allCodes   = [];
let allPatches = [];
let patchEditId = null; // null = add mode, uuid = edit mode

if (authToken) showAdmin();

// ── AUTH ────────────────────────────────────────────────────────
document.getElementById('login-form').addEventListener('submit', async e => {
  e.preventDefault();
  const btn = g('l-submit'), err = g('l-err');
  err.style.display = 'none';
  btn.disabled = true; btn.textContent = 'VERIFYING…';
  const token = btoa(`${g('l-user').value.trim()}:${g('l-pass').value}`);
  try {
    const r = await fetch('/api/admin/codes', { headers: { Authorization: `Bearer ${token}` } });
    if (!r.ok) throw new Error();
    authToken = token;
    sessionStorage.setItem('adm_token', token);
    allCodes = await r.json();
    showAdmin();
  } catch {
    err.style.display = 'block';
    btn.disabled = false; btn.textContent = 'LOGIN →';
  }
});

function doLogout() {
  sessionStorage.removeItem('adm_token');
  authToken = null; allCodes = []; allPatches = [];
  g('screen-admin').style.display = 'none';
  g('screen-login').style.display = 'flex';
}

function showAdmin() {
  g('screen-login').style.display = 'none';
  g('screen-admin').style.display = 'block';
  if (!allCodes.length) loadCodes(); else { updateStats(); renderTable(); }
}

// ── TABS ────────────────────────────────────────────────────────
function switchAdmTab(name, btn) {
  document.querySelectorAll('.adm-tab').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.adm-pane').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  g('adm-pane-' + name).classList.add('active');
  if (name === 'patches' && !allPatches.length) loadPatches();
}

// ── SHARED API ──────────────────────────────────────────────────
async function api(method, path, body) {
  const opts = { method, headers: { Authorization: `Bearer ${authToken}`, 'Content-Type': 'application/json' } };
  if (body !== undefined) opts.body = JSON.stringify(body);
  const r = await fetch(path, opts);
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}

// ── PROMO CODES ─────────────────────────────────────────────────
async function loadCodes() {
  try { allCodes = await api('GET', '/api/admin/codes'); updateStats(); renderTable(); }
  catch { toast('Failed to load', true); }
}

function updateStats() {
  const active = allCodes.filter(c => c.active).length;
  sv('s-total', allCodes.length);
  sv('s-active', active);
  sv('s-inactive', allCodes.length - active);
}

function renderTable() {
  const q      = g('tbl-search').value.trim().toLowerCase();
  const filter = g('tbl-filter').value;
  const rows = allCodes.filter(c => {
    if (filter === 'active'   && !c.active) return false;
    if (filter === 'inactive' &&  c.active) return false;
    return !q || (c.code + c.reward).toLowerCase().includes(q);
  });
  sv('tbl-count', `${rows.length} / ${allCodes.length}`);
  const body = g('tbl-body');
  if (!rows.length) { body.innerHTML = '<div class="tbl-empty">No codes found.</div>'; return; }
  body.innerHTML = rows.map(c => `
    <div class="tbl-row" style="grid-template-columns:56px 1fr 1fr 90px">
      <div class="td toggle-wrap">
        <label class="toggle">
          <input type="checkbox" ${c.active ? 'checked' : ''} onchange="toggleActive('${c.id}',this.checked)">
          <span class="toggle-track"></span><span class="toggle-thumb"></span>
        </label>
      </div>
      <div class="td td-code">${esc(c.code)}</div>
      <div class="td td-reward">${esc(c.reward) || '—'}</div>
      <div class="td td-actions">
        <button class="act-btn edit" onclick="openEdit('${c.id}')">Edit</button>
        <button class="act-btn del"  onclick="del('${c.id}')">Del</button>
      </div>
    </div>`).join('');
}

function toggleAddForm() {
  const box = g('add-form-box'), btn = g('add-toggle-btn');
  const open = box.classList.toggle('visible');
  btn.classList.toggle('open', open);
  btn.textContent = open ? '✕ CANCEL' : '＋ ADD NEW PROMO CODE';
  if (!open) { g('f-code').value = ''; g('f-reward').value = ''; }
}

async function submitAdd() {
  const code = g('f-code').value.trim();
  if (!code) { toast('Code is required', true); return; }
  try {
    const item = await api('POST', '/api/admin/codes', { code, reward: g('f-reward').value.trim() });
    allCodes.unshift(item); updateStats(); renderTable(); toggleAddForm(); toast('Code added ✓');
  } catch { toast('Failed to save', true); }
}

function openEdit(id) {
  const c = allCodes.find(x => x.id === id); if (!c) return;
  g('e-id').value = c.id; g('e-code').value = c.code;
  g('e-reward').value = c.reward || ''; g('e-active').checked = c.active;
  g('edit-modal').classList.add('open');
}
function closeEditModal() { g('edit-modal').classList.remove('open'); }

async function submitEdit() {
  const id = g('e-id').value, code = g('e-code').value.trim();
  if (!code) { toast('Code is required', true); return; }
  try {
    const updated = await api('PUT', `/api/admin/codes?id=${id}`, { code, reward: g('e-reward').value.trim(), active: g('e-active').checked });
    const idx = allCodes.findIndex(c => c.id === id);
    if (idx >= 0) allCodes[idx] = updated;
    updateStats(); renderTable(); closeEditModal(); toast('Updated ✓');
  } catch { toast('Failed to update', true); }
}

async function toggleActive(id, active) {
  try {
    const updated = await api('PUT', `/api/admin/codes?id=${id}`, { active });
    const idx = allCodes.findIndex(c => c.id === id);
    if (idx >= 0) allCodes[idx] = updated;
    updateStats(); renderTable();
  } catch { toast('Failed', true); }
}

async function del(id) {
  const c = allCodes.find(x => x.id === id); if (!c) return;
  if (!confirm(`Delete "${c.code}"?`)) return;
  try {
    await api('DELETE', `/api/admin/codes?id=${id}`);
    allCodes = allCodes.filter(x => x.id !== id);
    updateStats(); renderTable(); toast('Deleted');
  } catch { toast('Failed to delete', true); }
}

// ── PATCH NOTES ─────────────────────────────────────────────────
async function loadPatches() {
  g('ptbl-body').innerHTML = '<div class="tbl-empty">Loading…</div>';
  try { allPatches = await api('GET', '/api/admin/patch-notes'); renderPatchTable(); }
  catch { g('ptbl-body').innerHTML = '<div class="tbl-empty">Failed to load.</div>'; }
}

function renderPatchTable() {
  sv('ptbl-count', allPatches.length + ' patches');
  const body = g('ptbl-body');
  if (!allPatches.length) { body.innerHTML = '<div class="tbl-empty">No patch notes yet.</div>'; return; }
  body.innerHTML = allPatches.map(p => `
    <div class="tbl-row patch-tbl-row">
      <div class="td patch-ver-cell">v${esc(p.version)}</div>
      <div class="td" style="color:var(--dim)">${esc(p.release_date)}</div>
      <div class="td"><span class="type-badge ${esc(p.type)}">${esc(p.type).toUpperCase()}</span></div>
      <div class="td" style="color:var(--dim);font-size:12px">${Array.isArray(p.sections) ? p.sections.map(s => esc(s.title||'—')).join(', ') : '—'}</div>
      <div class="td td-actions">
        <button class="act-btn edit" onclick="openPatchEdit('${p.id}')">Edit</button>
        <button class="act-btn del"  onclick="delPatch('${p.id}')">Del</button>
      </div>
    </div>`).join('');
}

// ── PATCH FORM STATE ─────────────────────────────────────────────
// sections = [{title:'', items:[{dot:'buff', text:''}]}]
let pfSections = [];

function togglePatchForm(forceClose) {
  const box = g('patch-form-box'), btn = g('patch-toggle-btn');
  const isOpen = box.classList.contains('visible');
  if (forceClose || isOpen) {
    box.classList.remove('visible');
    btn.classList.remove('open');
    btn.textContent = '＋ ADD PATCH NOTE';
    patchEditId = null;
    pfSections = [];
    g('pf-ver').value = ''; g('pf-date').value = ''; g('pf-type').value = 'balance';
    sv('pf-save-btn', 'SAVE');
  } else {
    box.classList.add('visible');
    btn.classList.add('open');
    btn.textContent = '✕ CANCEL';
    if (!pfSections.length) pfAddSection();
    renderPfSections();
    box.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
}

function openPatchEdit(id) {
  const p = allPatches.find(x => x.id === id); if (!p) return;
  patchEditId = id;
  g('pf-ver').value  = p.version;
  g('pf-date').value = p.release_date;
  g('pf-type').value = p.type || 'balance';
  pfSections = JSON.parse(JSON.stringify(p.sections || []));
  // ensure each item has dot
  pfSections.forEach(s => s.items = (s.items||[]).map(it => ({ dot: it.dot||'buff', text: it.text||'' })));
  const box = g('patch-form-box'), btn = g('patch-toggle-btn');
  box.classList.add('visible'); btn.classList.add('open');
  btn.textContent = '✕ CANCEL';
  sv('pf-save-btn', 'UPDATE');
  renderPfSections();
  box.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function pfAddSection() {
  pfSections.push({ title: '', items: [{ dot: 'buff', text: '' }] });
  renderPfSections();
}

function pfRemoveSection(si) {
  pfSections.splice(si, 1);
  renderPfSections();
}

function pfAddItem(si) {
  pfSections[si].items.push({ dot: 'buff', text: '' });
  renderPfSections();
}

function pfRemoveItem(si, ii) {
  pfSections[si].items.splice(ii, 1);
  renderPfSections();
}


function renderPfSections() {
  const DOT_OPTS = [
    {v:'new',    l:'🆕 NEW'},
    {v:'buff',   l:'⬆ BUFF'},
    {v:'nerf',   l:'⬇ NERF'},
    {v:'fix',    l:'🔧 FIX'},
    {v:'neutral',l:'— NEUTRAL'},
  ];
  const html = pfSections.map((s, si) => `
    <div class="patch-section-block">
      <div class="patch-section-hdr">
        <input class="finput" value="${esc(s.title)}" placeholder="Section title (e.g. BALANCE CHANGES)"
          oninput="pfSections[${si}].title=this.value">
        <button class="btn-icon" onclick="pfRemoveSection(${si})" title="Remove section">✕</button>
      </div>
      ${s.items.map((it, ii) => `
        <div class="patch-item-row" style="align-items:flex-start">
          <select class="dot-sel" style="margin-top:2px" onchange="pfSections[${si}].items[${ii}].dot=this.value">
            ${DOT_OPTS.map(o => `<option value="${o.v}"${o.v===it.dot?' selected':''}>${o.l}</option>`).join('')}
          </select>
          <textarea class="finput item-textarea" rows="4" placeholder="Change description (Enter for new paragraph)"
            oninput="pfSections[${si}].items[${ii}].text=this.value">${esc(it.text)}</textarea>
          <button class="btn-icon" style="margin-top:2px" onclick="pfRemoveItem(${si},${ii})" title="Remove item">✕</button>
        </div>`).join('')}
      <button class="btn-add-item" onclick="pfAddItem(${si})">＋ Add item</button>
    </div>`).join('');
  g('pf-sections').innerHTML = html;
}

async function submitPatch() {
  const version      = g('pf-ver').value.trim();
  const release_date = g('pf-date').value.trim();
  const type         = g('pf-type').value;
  if (!release_date) { toast('Date is required', true); return; }
  // read values directly from DOM (more reliable than relying on oninput alone)
  const sectionEls = g('pf-sections').querySelectorAll('.patch-section-block');
  const sections = Array.from(sectionEls).map(sEl => {
    const title = sEl.querySelector('input.finput')?.value.trim() || '';
    const items = Array.from(sEl.querySelectorAll('.patch-item-row')).map(row => ({
      dot:  row.querySelector('select')?.value || 'neutral',
      text: row.querySelector('textarea')?.value.trim() || ''
    })).filter(it => it.text);
    return { title, items };
  }).filter(s => s.items.length || s.title);

  try {
    if (patchEditId) {
      const updated = await api('PUT', `/api/admin/patch-notes?id=${patchEditId}`, { version, release_date, type, sections });
      const idx = allPatches.findIndex(p => p.id === patchEditId);
      if (idx >= 0) allPatches[idx] = { ...allPatches[idx], version, release_date, type, sections };
      toast('Updated ✓');
    } else {
      const item = await api('POST', '/api/admin/patch-notes', { version, release_date, type, sections });
      allPatches.unshift(item);
      toast('Patch note added ✓');
    }
    renderPatchTable();
    togglePatchForm(true);
  } catch { toast('Failed to save', true); }
}

async function delPatch(id) {
  const p = allPatches.find(x => x.id === id); if (!p) return;
  if (!confirm(`Delete patch v${p.version}?`)) return;
  try {
    await api('DELETE', `/api/admin/patch-notes?id=${id}`);
    allPatches = allPatches.filter(x => x.id !== id);
    renderPatchTable(); toast('Deleted');
  } catch { toast('Failed to delete', true); }
}

// ── UTILS ───────────────────────────────────────────────────────
function g(id)   { return document.getElementById(id); }
function sv(id,v){ const el=g(id); if(el) el.textContent=v; }
function esc(s)  { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

let toastTimer;
function toast(msg, isErr=false) {
  const el = g('toast');
  el.textContent = msg;
  el.className = `toast ${isErr?'err':'ok'} show`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
}

g('edit-modal').addEventListener('click', e => { if (e.target===g('edit-modal')) closeEditModal(); });
</script>
</body>
</html>
